{% extends 'base.html' %}
{% block title %}메인 - 온라인 게시판{% endblock %}
{% block content %}
<div class="card">
    <h1>게시판 목록</h1>
    {% if boards %}
        <ul style="list-style: none; display: flex; flex-direction: column; gap: 10px;">
            {% for board in boards %}
                <li>
                    <a href="/board/{{ board.id }}" style="font-size: 15px; font-weight: 600;">
                        📌 {{ board.name }}
                    </a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p class="text-muted">등록된 게시판이 없습니다.</p>
    {% endif %}
</div>
<div class="card">
    <h2>🔍 유저 검색</h2>
    <form action="/search/user" method="GET" style="display: flex; gap: 8px;">
        <input type="text" name="keyword" placeholder="검색할 유저명 입력" style="max-width: 300px;" required>
        <button type="submit" class="btn btn-secondary">검색</button>
    </form>
</div>
{% endblock %}
