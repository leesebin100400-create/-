<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}온라인 게시판{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; background: #f0f2f5; color: #1a1a1a; min-height: 100vh; }
        .navbar {
            background: #2d6be4; color: white; padding: 0 24px;
            height: 56px; display: flex; align-items: center;
            justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .navbar a { color: white; text-decoration: none; font-weight: 600; font-size: 18px; }
        .navbar-links { display: flex; gap: 16px; align-items: center; font-size: 14px; }
        .navbar-links a { color: rgba(255,255,255,0.88); font-weight: 400; }
        .navbar-links a:hover { color: white; }
        .navbar-links span { color: rgba(255,255,255,0.6); }
        .container { max-width: 860px; margin: 32px auto; padding: 0 16px; }
        .card { background: white; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); padding: 32px; margin-bottom: 20px; }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
        h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .btn { display: inline-block; padding: 8px 18px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; text-decoration: none; transition: opacity 0.15s; }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #2d6be4; color: white; }
        .btn-secondary { background: #f0f2f5; color: #444; border: 1px solid #ddd; }
        .btn-danger { background: #e53e3e; color: white; }
        .btn-sm { padding: 5px 12px; font-size: 13px; }
        .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
        .alert-error { background: #fff5f5; border: 1px solid #fc8181; color: #c53030; }
        input[type=text], input[type=password], textarea { width: 100%; padding: 9px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; font-family: inherit; transition: border-color 0.2s; outline: none; }
        input:focus, textarea:focus { border-color: #2d6be4; box-shadow: 0 0 0 3px rgba(45,107,228,0.12); }
        label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        .form-group { margin-bottom: 18px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #f8f9fa; padding: 10px 12px; text-align: left; font-size: 13px; color: #666; border-bottom: 2px solid #e5e7eb; }
        td { padding: 11px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
        tr:hover td { background: #fafbff; }
        a { color: #2d6be4; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .text-muted { color: #888; font-size: 13px; }
        .text-center { text-align: center; }
        .mt-16 { margin-top: 16px; }
        .flex { display: flex; }
        .gap-8 { gap: 8px; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/">📋 온라인 게시판</a>
        <div class="navbar-links">
            {% if session.get('username') %}
                <span>{{ session['username'] }}님</span>
                <a href="/logout">로그아웃</a>
            {% else %}
                <a href="/login">로그인</a>
                <a href="/register">회원가입</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
