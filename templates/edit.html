<!DOCTYPE html>
<html>
<head>
    <title>글 수정</title>
</head>
<body>
    <h1>게시글 수정</h1>
    <form action="/post/{{ post.id }}/edit" method="POST" enctype="multipart/form-data">
        <p>
            <label>제목: <input type="text" name="title" value="{{ post.title }}" style="width: 300px;" required></label>
        </p>
        <p>
            <label>본문:<br>
            <textarea name="content" rows="10" cols="40" required>{{ post.content }}</textarea></label>
        </p>
        <p>
            <label>새 첨부파일로 교체: <input type="file" name="file"></label><br>
            <small style="color: gray;">* 기존 파일이 있을 경우, 새 파일을 업로드하면 기존 파일은 교체됩니다.</small>
        </p>
        <button type="submit">수정 완료</button>
        <a href="/post/{{ post.id }}">취소</a>
    </form>
</body>
</html>
