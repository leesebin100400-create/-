<!DOCTYPE html>
<html>
<head>
    <title>글쓰기</title>
</head>
<body>
    <h1>새 글 작성</h1>
    <form action="/board/{{ board_id }}/write" method="POST" enctype="multipart/form-data">
        <p>
            <label>제목: <input type="text" name="title" style="width: 300px;" required></label>
        </p>
        <p>
            <label>본문:<br>
            <textarea name="content" rows="10" cols="40" required></textarea></label>
        </p>
        <p>
            <label>첨부파일: <input type="file" name="file"></label>
        </p>
        <button type="submit">작성 완료</button>
        <a href="/board/{{ board_id }}">취소</a>
    </form>
</body>
</html>
